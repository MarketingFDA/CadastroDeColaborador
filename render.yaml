services:
  - type: web
    name: cadastro-colaborador-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_CLIENT_ID
        sync: false
      - key: GMAIL_CLIENT_SECRET
        sync: false
      - key: GMAIL_REFRESH_TOKEN
        sync: false
      - key: RECRUTAMENTO_EMAILS
        value: recrutamento@fradema.com.br,frademarh12@fradema.com.br
      - key: CORS_ORIGIN
        value: https://marketingfda.github.io
