services:
  - type: web
    name: cadastro-colaborador-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: RECRUTAMENTO_EMAILS
        value: recrutamento@fradema.com.br,frademarh12@fradema.com.br
      - key: CORS_ORIGIN
        value: https://marketingfda.github.io
